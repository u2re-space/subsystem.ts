<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>explorer-view demo (HTTPS)</title>
        <script>
            WeakMap.prototype.getOrInsert ??= function (key, defaultValue) {
                if (!this.has(key)) {
                    this.set(key, defaultValue);
                }
                return this.get(key);
            };
            WeakMap.prototype.getOrInsertComputed ??= function (key, callbackFunction) {
                if (!this.has(key)) {
                    this.set(key, callbackFunction(key));
                }
                return this.get(key);
            };
            Map.prototype.getOrInsert ??= function (key, defaultValue) {
                if (!this.has(key)) {
                    this.set(key, defaultValue);
                }
                return this.get(key);
            };
            Map.prototype.getOrInsertComputed ??= function (key, callbackFunction) {
                if (!this.has(key)) {
                    this.set(key, callbackFunction(key));
                }
                return this.get(key);
            };
        </script>
        <style>
            /* minimal normalize — shell only */
            *,
            *::before,
            *::after {
                box-sizing: border-box;
            }
            html {
                -webkit-text-size-adjust: 100%;
                height: 100%;
            }
            body {
                margin: 0;
                min-height: 100%;
                font-family: system-ui, "Segoe UI", Roboto, sans-serif;
                background: #0b1220;
                color: #e8edf5;
            }
            img,
            video,
            svg {
                display: block;
                max-width: 100%;
                height: auto;
            }
            button,
            input,
            textarea,
            select {
                font: inherit;
            }
            .explorer-demo-page {
                min-height: 100vh;
                padding: 0.75rem;
            }
            [data-demo-status] {
                font-size: 0.8rem;
                color: #8b9bb8;
                margin-bottom: 0.5rem;
                min-height: 1.25em;
            }
            [data-demo-status][data-state="loading"] {
                color: #fbbf24;
            }
            [data-demo-status][data-state="error"] {
                color: #f87171;
            }
            [data-demo-status][data-state="ready"] {
                color: #6ee7b7;
            }
            #fl-ui-explorer-mount {
                min-height: 12rem;
                border: 1px solid #2a3650;
                border-radius: 10px;
                background: #151d2e;
                overflow: auto;
            }
        </style>
    </head>
    <body>
        <div class="explorer-demo-page">
            <p data-demo-status data-state="loading" aria-live="polite">Loading explorer…</p>
            <div id="fl-ui-explorer-mount" aria-label="Explorer output"></div>
        </div>
        <script type="module" src="/test/explorer-demo.ts"></script>
    </body>
</html>
